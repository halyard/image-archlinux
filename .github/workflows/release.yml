---
name: Release
'on':
  push:
    tags:
    - "**"
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Make
      env:
        PKGFORGE_STATEFILE: "/tmp/pkgforge"
      run: make
    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: pkg/image
